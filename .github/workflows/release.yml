name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  GO_VERSION: "1.25"

jobs:
  release-cli:
    name: CLI (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          working-directory: src

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Build CLI
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          EXT=""
          if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi
          cd src
          go build -trimpath -ldflags "-s -w -X main.version=${{ steps.version.outputs.VERSION }}" \
            -o ../dist/oshind-${{ matrix.goos }}-${{ matrix.goarch }}${EXT} ./cmd/cli/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: oshind-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/oshind-*

  release-ffi:
    name: FFI (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: windows
            goarch: amd64
          - goos: darwin
            goarch: amd64
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          working-directory: src

      - name: Install cross-compilation tools
        run: |
          if [ "${{ matrix.goos }}" = "linux" ] && [ "${{ matrix.goarch }}" = "arm64" ]; then
            sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
          fi

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Build FFI
        env:
          CGO_ENABLED: "1"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          EXT="so"
          PREFIX="lib"
          if [ "$GOOS" = "windows" ]; then EXT="dll"; PREFIX=""; fi
          if [ "$GOOS" = "darwin" ]; then EXT="dylib"; fi
          cd src
          go build -trimpath -ldflags "-s -w -X main.version=${{ steps.version.outputs.VERSION }}" \
            -buildmode=c-shared \
            -o ../dist/${PREFIX}oshind.${EXT} ./cmd/ffi/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: oshind-ffi-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*

  create-release:
    name: Create GitHub Release
    needs: [release-cli, release-ffi]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -lhR dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
